<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:,">
    <title>태안 요요 키즈풀빌라 독채 펜션</title>
    <meta name="description" content="태안 요요 키즈 풀빌라">
    <meta name="keywords" content="태안 요요 키즈 풀빌라">
    <meta name="naver-site-verification" content="">
    <meta name="google-site-verification" content="">
    <!-- Stylesheets -->
    <link rel="stylesheet" href="styles/theme.css">
    <link rel="stylesheet" href="styles/common.css">
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="styles/layout-map.css">
  <!-- Open Graph Meta Tags for Social Media -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="태안 요요 키즈풀빌라 독채 펜션" />
  <meta property="og:description" content="오직 우리 아이들만을 위한 공간을 갖고 있는 태안 요요 독채 키즈풀빌라입니다.여행지에서 아이들이 편안하고 즐겁게 놀 수 있는 경험을 느껴보세요" />
  <meta property="og:image" content="https://bookingplay-media.s3.amazonaws.com/item_images/2026/07/07/DjvhaSIYCZ4q.jpg" />
  <meta property="og:url" content="https://yoyopoolvilla.kr" />

  <!-- Twitter Card Meta Tags -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="태안 요요 키즈풀빌라 독채 펜션" />
  <meta name="twitter:description" content="오직 우리 아이들만을 위한 공간을 갖고 있는 태안 요요 독채 키즈풀빌라입니다.여행지에서 아이들이 편안하고 즐겁게 놀 수 있는 경험을 느껴보세요" />
  <meta name="twitter:image" content="https://bookingplay-media.s3.amazonaws.com/item_images/2026/07/07/DjvhaSIYCZ4q.jpg" />
</head>
<body>

    <!-- Navigation (Header) -->
    <div class="index-page">
        <div id="header-container"></div>
    </div>

    <div id="app" class="layout-map-page">

        <!-- HERO SECTION -->
        <div class="main-section">
            <!-- custom field : 히어로 슬라이더 이미지 동적 생성 (mapper) -->
            <div class="main-bg" data-layout-map-hero-slider></div>
            <div class="main-content">
                <!-- custom field : 배치도 섹션 타이틀 매핑 -->
                <h1 class="main-title" data-layout-map-hero-title></h1>
                <div class="title-divider"><div class="bar-progress"></div></div>
                <!-- custom field : 배치도 섹션 설명 매핑 -->
                <p class="main-subtitle" data-layout-map-hero-description></p>
            </div>
            <div class="main-arrow">
                <div class="arrow-left"></div>
                <p class="arrow-number">01</p>
                <div class="arrow-divider"></div>
                <p class="arrow-number">01</p>
                <div class="arrow-right"></div>
            </div>
        </div>

        <!-- ABOUT SECTION : 배치도 -->
        <div class="section-layoutmap">
            <!-- 하드코딩, 매핑 x -->
            <p class="section-title">Layout Map</p>
            <!-- custom field : 배치도 이미지 및 설명 동적 생성 (mapper) -->
            <div data-layout-map-about></div>
        </div>

        <!-- CLOSING SECTION -->
        <div class="content-4 closing-section">
            <!-- custom field : 마무리 섹션 이미지 매핑 -->
            <div class="content-4-bg" data-closing-image></div>
            <div class="content-4-text">
                <!-- custom field : 마무리 섹션 제목 매핑 -->
                <h2 data-closing-title></h2>
                <!-- custom field : 마무리 섹션 내용 매핑 -->
                <p data-closing-description></p>
            </div>
        </div>

    </div>

    <div id="footer-container"></div>

    <!-- Scripts -->
    <script src="js/common.js"></script>
    <script src="js/pages/layout-map.js"></script>

    <!-- Data Mapper -->
    <script src="js/image-helpers.js"></script>
    <script src="js/data-mapper/core/base-mapper.js"></script>
    <script src="js/data-mapper/pages/layout-map-mapper.js"></script>
    <script src="js/preview-handler.js"></script>

    <!-- Header / Footer Loader -->
    <script src="js/header-footer-loader.js"></script>

    <!-- Enabled 상태 감시 (미노출 → 노출 변경 감지) -->
    <script>
        (function() {
            function checkPageEnabled() {
                if (!window.PreviewHandler || !window.PreviewHandler.currentData) return;

                const data = window.PreviewHandler.currentData;
                const enabled = data?.homepage?.customFields?.pages?.layoutMap?.sections?.[0]?.enabled;

                if (enabled === false) {
                    location.replace('404.html');
                }
            }

            if (typeof window !== 'undefined' && window.parent === window) {
                window.addEventListener('DOMContentLoaded', () => {
                    setTimeout(checkPageEnabled, 500);
                    setInterval(checkPageEnabled, 1000);
                });

                // 탭이 활성화될 때 enabled 상태 확인
                document.addEventListener('visibilitychange', () => {
                    if (!document.hidden) {
                        setTimeout(checkPageEnabled, 100);
                    }
                });
            }
        })();
    </script>
</body>
</html>
